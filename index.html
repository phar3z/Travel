<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>travel.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="logo">travel.</div>
      <p class="tagline">Book your trip in minutes, get full control for much longer.</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <h1>Create Account</h1>

      <!-- Social buttons -->
      <div class="social-buttons">
        <button class="btn-social">🔵 Sign up with Google</button>
        <button class="btn-social">📘 Sign up with Facebook</button>
      </div>

      <p class="divider">— OR —</p>

      <!-- Form fields -->
      <input type="text" placeholder="Full Name" />
      <input type="email" placeholder="Email Address" />
      <input type="password" placeholder="Password" />

      <!-- Submit -->
      <button class="btn-primary">Create Account</button>

      <p class="login-hint">Already have an account? <a href="#">Log In</a></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
